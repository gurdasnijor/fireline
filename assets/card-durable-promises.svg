<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0b0b0d" rx="8"/>
  <g transform="translate(50, 80)">
    <!-- Timeline -->
    <line x1="0" y1="100" x2="100" y2="100" stroke="#ff6b35" stroke-width="2"/>
    <line x1="100" y1="100" x2="200" y2="100" stroke="#334155" stroke-width="2" stroke-dasharray="8,4"/>
    <line x1="200" y1="100" x2="300" y2="100" stroke="#ff6b35" stroke-width="2"/>
    
    <circle cx="100" cy="100" r="4" fill="#ff6b35"/>
    <circle cx="200" cy="100" r="4" fill="#ff6b35"/>
    
    <text x="150" y="80" text-anchor="middle" fill="#ff6b35" font-family="monospace" font-size="10">{sessionId, requestId}</text>
    
    <!-- External Actor -->
    <g transform="translate(150, 20)">
      <rect x="-20" y="0" width="40" height="20" rx="4" fill="#161b22" stroke="#ff6b35" stroke-width="1"/>
      <text x="0" y="14" text-anchor="middle" fill="#ff6b35" font-family="Inter" font-size="8">HUMAN</text>
      <path d="M0 20 V60" fill="none" stroke="#ff6b35" stroke-width="1" stroke-dasharray="2,2"/>
    </g>
    
    <text x="50" y="120" text-anchor="middle" fill="#484f58" font-family="Inter" font-size="8">Running</text>
    <text x="150" y="120" text-anchor="middle" fill="#484f58" font-family="Inter" font-size="8">Paused (Durable)</text>
    <text x="250" y="120" text-anchor="middle" fill="#484f58" font-family="Inter" font-size="8">Resumed</text>
  </g>
</svg>
