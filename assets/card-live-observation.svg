<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0b0b0d" rx="8"/>
  <g transform="translate(50, 50)">
    <!-- Stream on left -->
    <rect x="0" y="20" width="40" height="160" rx="4" fill="#161b22" stroke="#334155" stroke-width="1"/>
    <line x1="20" y1="20" x2="20" y2="180" stroke="#334155" stroke-width="1" stroke-dasharray="4,2"/>
    <circle cx="20" cy="50" r="3" fill="#ff6b35"/>
    <circle cx="20" cy="90" r="3" fill="#ff6b35"/>
    <circle cx="20" cy="130" r="3" fill="#ff6b35"/>
    
    <!-- Materializing -->
    <path d="M40 100 L120 100" fill="none" stroke="#ff6b35" stroke-width="1" stroke-dasharray="4,4"/>
    
    <!-- Collections on right -->
    <g transform="translate(130, 40)">
      <rect x="0" y="0" width="170" height="25" rx="2" fill="#1e293b" fill-opacity="0.5"/>
      <text x="10" y="16" fill="#8b949e" font-family="monospace" font-size="10">sessions</text>
      
      <rect x="0" y="35" width="170" height="25" rx="2" fill="#1e293b" fill-opacity="0.5"/>
      <text x="10" y="51" fill="#8b949e" font-family="monospace" font-size="10">permissions</text>
      
      <rect x="0" y="70" width="170" height="25" rx="2" fill="#1e293b" fill-opacity="0.5"/>
      <text x="10" y="86" fill="#8b949e" font-family="monospace" font-size="10">promptTurns</text>
      
      <!-- React Icon -->
      <g transform="translate(140, 110)">
        <circle cx="0" cy="0" r="5" fill="#61dafb"/>
        <ellipse cx="0" cy="0" rx="15" ry="6" fill="none" stroke="#61dafb" stroke-width="0.5"/>
        <ellipse cx="0" cy="0" rx="15" ry="6" fill="none" stroke="#61dafb" stroke-width="0.5" transform="rotate(60)"/>
        <ellipse cx="0" cy="0" rx="15" ry="6" fill="none" stroke="#61dafb" stroke-width="0.5" transform="rotate(120)"/>
        <path d="M0 -30 V-10" fill="none" stroke="#ff6b35" stroke-width="1" stroke-dasharray="2,2"/>
      </g>
    </g>
  </g>
</svg>
