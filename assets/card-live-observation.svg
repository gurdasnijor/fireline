<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff3d00;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0b0b0d" rx="8"/>
  <g transform="translate(40, 40)">
    <!-- Stream Spine -->
    <rect x="0" y="20" width="30" height="200" rx="4" fill="#161b22" stroke="#334155" stroke-width="0.5"/>
    <line x1="15" y1="20" x2="15" y2="220" stroke="#334155" stroke-width="1" stroke-dasharray="4,2"/>
    <circle cx="15" cy="50" r="3" fill="#ff6b35"/>
    <circle cx="15" cy="80" r="3" fill="#ff6b35" fill-opacity="0.6"/>
    <circle cx="15" cy="110" r="3" fill="#ff6b35"/>
    <circle cx="15" cy="140" r="3" fill="#ff6b35" fill-opacity="0.6"/>
    <circle cx="15" cy="170" r="3" fill="#ff6b35"/>
    
    <!-- Materializing -->
    <path d="M30 100 L100 100" fill="none" stroke="#ff6b35" stroke-width="1" stroke-dasharray="4,4"/>
    
    <!-- Dashboard Rows (Live Projection) -->
    <g transform="translate(110, 30)">
      <text x="0" y="-10" fill="#484f58" font-family="Inter" font-size="8">Live Projection (db.permissions)</text>
      
      <!-- Row 1 -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="220" height="30" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
        <rect x="10" y="10" width="60" height="10" rx="1" fill="#30363d"/>
        <rect x="150" y="10" width="50" height="10" rx="1" fill="#166534" fill-opacity="0.2" stroke="#10b981" stroke-width="0.5"/>
        <text x="155" y="18" fill="#10b981" font-family="monospace" font-size="7">ALLOW</text>
      </g>
      
      <!-- Row 2 -->
      <g transform="translate(0, 40)">
        <rect x="0" y="0" width="220" height="30" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
        <rect x="10" y="10" width="80" height="10" rx="1" fill="#30363d"/>
        <rect x="150" y="10" width="50" height="10" rx="1" fill="#ff6b35" fill-opacity="0.1" stroke="#ff6b35" stroke-width="0.5"/>
        <text x="155" y="18" fill="#ff6b35" font-family="monospace" font-size="7">PENDING</text>
      </g>
      
      <!-- Row 3 -->
      <g transform="translate(0, 80)">
        <rect x="0" y="0" width="220" height="30" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
        <rect x="10" y="10" width="40" height="10" rx="1" fill="#30363d"/>
        <rect x="150" y="10" width="50" height="10" rx="1" fill="#166534" fill-opacity="0.2" stroke="#10b981" stroke-width="0.5"/>
        <text x="155" y="18" fill="#10b981" font-family="monospace" font-size="7">ALLOW</text>
      </g>

      <!-- Row 4 -->
      <g transform="translate(0, 120)">
        <rect x="0" y="0" width="220" height="30" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
        <rect x="10" y="10" width="100" height="10" rx="1" fill="#30363d"/>
        <circle cx="175" cy="15" r="4" fill="#ff6b35" filter="url(#glow)"/>
      </g>
    </g>
  </g>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="2" result="blur" />
    <feComposite in="SourceGraphic" in2="blur" operator="over" />
  </filter>
</svg>
