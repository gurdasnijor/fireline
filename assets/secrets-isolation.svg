<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480">
  <rect width="900" height="480" fill="#0b1020" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e2e8f0" font-family="ui-monospace, monospace" font-size="18" font-weight="600">Secrets Isolation</text>
  <text x="450" y="58" text-anchor="middle" fill="#64748b" font-family="ui-monospace, monospace" font-size="11">Credentials never cross the agent boundary. The harness injects them at call time.</text>

  <!-- Left: Agent's View -->
  <rect x="40" y="80" width="250" height="280" rx="10" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="40" y="80" width="250" height="30" rx="10" fill="#3b82f6" fill-opacity="0.2"/>
  <text x="165" y="100" text-anchor="middle" fill="#60a5fa" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Agent sees</text>

  <text x="60" y="130" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="10">tools: [</text>
  <text x="60" y="148" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="10">  {</text>
  <text x="60" y="166" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="10">    name: "github_api"</text>
  <text x="60" y="184" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="10">    params: { endpoint,</text>
  <text x="60" y="202" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="10">              method,</text>
  <text x="60" y="220" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="10">              body }</text>
  <text x="60" y="238" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="10">  }</text>
  <text x="60" y="256" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="10">]</text>

  <text x="60" y="290" fill="#dc2626" font-family="ui-monospace, monospace" font-size="10">// No token parameter.</text>
  <text x="60" y="306" fill="#dc2626" font-family="ui-monospace, monospace" font-size="10">// No env var visible.</text>
  <text x="60" y="322" fill="#dc2626" font-family="ui-monospace, monospace" font-size="10">// Cannot exfiltrate.</text>

  <!-- Center: Harness / Middleware -->
  <rect x="330" y="80" width="240" height="280" rx="10" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="330" y="80" width="240" height="30" rx="10" fill="#f59e0b" fill-opacity="0.2"/>
  <text x="450" y="100" text-anchor="middle" fill="#fbbf24" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Harness injects</text>

  <text x="345" y="130" fill="#fbbf24" font-family="ui-monospace, monospace" font-size="10">secretsProxy({</text>
  <text x="345" y="148" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="10">  GITHUB_TOKEN: {</text>
  <text x="345" y="166" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="10">    ref: "secret:gh-pat"</text>
  <text x="345" y="184" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="10">    allow:</text>
  <text x="345" y="202" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="10">      "api.github.com"</text>
  <text x="345" y="220" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="10">  }</text>
  <text x="345" y="238" fill="#fbbf24" font-family="ui-monospace, monospace" font-size="10">})</text>

  <text x="345" y="270" fill="#22c55e" font-family="ui-monospace, monospace" font-size="10">// Resolved at call time</text>
  <text x="345" y="286" fill="#22c55e" font-family="ui-monospace, monospace" font-size="10">// Scoped to one domain</text>
  <text x="345" y="302" fill="#22c55e" font-family="ui-monospace, monospace" font-size="10">// Audit envelope logged</text>
  <text x="345" y="318" fill="#22c55e" font-family="ui-monospace, monospace" font-size="10">// Revocable via stream</text>

  <!-- Right: What actually executes -->
  <rect x="610" y="80" width="250" height="280" rx="10" fill="#0f172a" stroke="#10b981" stroke-width="1.5"/>
  <rect x="610" y="80" width="250" height="30" rx="10" fill="#10b981" fill-opacity="0.2"/>
  <text x="735" y="100" text-anchor="middle" fill="#34d399" font-family="ui-monospace, monospace" font-size="11" font-weight="600">Wire sees</text>

  <text x="625" y="130" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="10">GET api.github.com/repos</text>
  <text x="625" y="148" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="10">Authorization:</text>
  <text x="625" y="166" fill="#34d399" font-family="ui-monospace, monospace" font-size="10">  Bearer ghp_****</text>

  <text x="625" y="200" fill="#64748b" font-family="ui-monospace, monospace" font-size="10">Injected by harness.</text>
  <text x="625" y="218" fill="#64748b" font-family="ui-monospace, monospace" font-size="10">Agent never saw the</text>
  <text x="625" y="236" fill="#64748b" font-family="ui-monospace, monospace" font-size="10">token value.</text>

  <!-- Audit trail at bottom -->
  <text x="735" y="270" fill="#64748b" font-family="ui-monospace, monospace" font-size="9">Audit envelope:</text>
  <text x="625" y="288" fill="#a78bfa" font-family="ui-monospace, monospace" font-size="9">credential_injected</text>
  <text x="625" y="304" fill="#64748b" font-family="ui-monospace, monospace" font-size="9">  ref: secret:gh-pat</text>
  <text x="625" y="320" fill="#64748b" font-family="ui-monospace, monospace" font-size="9">  target: api.github.com</text>
  <text x="625" y="336" fill="#64748b" font-family="ui-monospace, monospace" font-size="9">  session: abc-123</text>

  <!-- Arrows between columns -->
  <line x1="290" y1="200" x2="325" y2="200" stroke="#475569" stroke-width="1.5"/>
  <polygon points="323,196 331,200 323,204" fill="#475569"/>
  <text x="308" y="190" text-anchor="middle" fill="#475569" font-family="ui-monospace, monospace" font-size="8">tool_call</text>

  <line x1="570" y1="200" x2="605" y2="200" stroke="#475569" stroke-width="1.5"/>
  <polygon points="603,196 611,200 603,204" fill="#475569"/>
  <text x="588" y="190" text-anchor="middle" fill="#475569" font-family="ui-monospace, monospace" font-size="8">+ secret</text>

  <!-- Bottom: The compose() config -->
  <rect x="100" y="385" width="700" height="75" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="120" y="408" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="11">compose(</text>
  <text x="120" y="424" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="11">  sandbox({ resources: [...] }),</text>
  <text x="120" y="440" fill="#fbbf24" font-family="ui-monospace, monospace" font-size="11">  middleware([ trace(), approve(), secretsProxy({ GITHUB_TOKEN: { ref: "secret:gh-pat" } }) ]),</text>
  <text x="120" y="456" fill="#94a3b8" font-family="ui-monospace, monospace" font-size="11">  agent(['claude-code-acp'])</text>

  <!-- Bottom caption -->
  <text x="450" y="478" text-anchor="middle" fill="#475569" font-family="ui-monospace, monospace" font-size="9">One line of middleware. Credentials isolated, domain-scoped, audited, revocable. Zero agent code changes.</text>
</svg>
