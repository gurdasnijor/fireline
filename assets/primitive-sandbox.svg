<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff3d00;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0b0b0d" rx="8"/>
  <g transform="translate(50, 60)">
    <!-- Execution Surface (Sandbox) -->
    <rect x="0" y="20" width="300" height="180" rx="8" fill="#161b22" stroke="#334155" stroke-width="1"/>
    <text x="150" y="10" text-anchor="middle" fill="#484f58" font-family="Inter" font-size="8">Execution Surface (Sandbox)</text>
    
    <!-- Pluggable Provider Slots -->
    <g transform="translate(20, 40)">
      <rect x="0" y="0" width="80" height="40" rx="4" fill="#1e293b" fill-opacity="0.3" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,2"/>
      <text x="40" y="25" text-anchor="middle" fill="#484f58" font-family="Inter" font-size="8">Docker</text>
    </g>
    <g transform="translate(110, 40)">
      <rect x="0" y="0" width="80" height="40" rx="4" fill="#1e293b" fill-opacity="0.3" stroke="#ff6b35" stroke-width="1"/>
      <text x="40" y="25" text-anchor="middle" fill="#ff6b35" font-family="Inter" font-size="8">microVM</text>
      <circle cx="70" cy="10" r="3" fill="#ff6b35" filter="url(#glow)"/>
    </g>
    <g transform="translate(200, 40)">
      <rect x="0" y="0" width="80" height="40" rx="4" fill="#1e293b" fill-opacity="0.3" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,2"/>
      <text x="40" y="25" text-anchor="middle" fill="#484f58" font-family="Inter" font-size="8">E2B</text>
    </g>

    <!-- Execution Context -->
    <g transform="translate(40, 110)">
      <rect x="0" y="0" width="220" height="60" rx="4" fill="#0b0b0d" stroke="#30363d" stroke-width="1"/>
      <text x="110" y="25" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="8">RUNTIME CONTEXT</text>
      <line x1="20" y1="40" x2="200" y2="40" stroke="#30363d" stroke-width="1"/>
      <text x="20" y="52" fill="#484f58" font-family="monospace" font-size="6">/workspace  /tmp  /secrets</text>
    </g>

    <!-- Isolation Barrier -->
    <rect x="-10" y="20" width="320" height="180" rx="10" fill="none" stroke="#ff6b35" stroke-width="0.5" stroke-dasharray="8,8" stroke-opacity="0.2"/>
  </g>
  <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="2" result="blur" />
    <feComposite in="SourceGraphic" in2="blur" operator="over" />
  </filter>
</svg>
