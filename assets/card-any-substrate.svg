<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff3d00;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0b0b0d" rx="8"/>
  <g transform="translate(200, 150)">
    <!-- Central agent.ts spec -->
    <rect x="-25" y="-35" width="50" height="70" rx="2" fill="#1e293b" stroke="#ff6b35" stroke-width="1.5"/>
    <text x="0" y="-10" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="8">agent.ts</text>
    <line x1="-15" y1="5" x2="15" y2="5" stroke="#334155" stroke-width="2"/>
    <line x1="-15" y1="15" x2="15" y2="15" stroke="#334155" stroke-width="2"/>
    <line x1="-15" y1="25" x2="5" y2="25" stroke="#334155" stroke-width="2"/>

    <!-- 6 Targets fanning out -->
    <!-- Local -->
    <g transform="translate(-140, -80)">
      <rect x="-30" y="-20" width="60" height="40" rx="4" fill="#161b22" stroke="#30363d"/>
      <text x="0" y="5" text-anchor="middle" fill="#8b949e" font-family="Inter" font-size="8">Local</text>
      <path d="M30 0 L115 45" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4,2"/>
    </g>
    
    <!-- Docker -->
    <g transform="translate(-140, 0)">
      <rect x="-30" y="-20" width="60" height="40" rx="4" fill="#161b22" stroke="#30363d"/>
      <text x="0" y="5" text-anchor="middle" fill="#8b949e" font-family="Inter" font-size="8">Docker</text>
      <path d="M30 0 L115 0" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4,2"/>
    </g>

    <!-- microVM -->
    <g transform="translate(-140, 80)">
      <rect x="-30" y="-20" width="60" height="40" rx="4" fill="#161b22" stroke="#30363d"/>
      <text x="0" y="5" text-anchor="middle" fill="#8b949e" font-family="Inter" font-size="8">microVM</text>
      <path d="M30 0 L115 -45" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4,2"/>
    </g>

    <!-- E2B -->
    <g transform="translate(140, -80)">
      <rect x="-30" y="-20" width="60" height="40" rx="4" fill="#161b22" stroke="#30363d"/>
      <text x="0" y="5" text-anchor="middle" fill="#8b949e" font-family="Inter" font-size="8">E2B</text>
      <path d="M-30 0 L-115 45" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4,2"/>
    </g>

    <!-- Daytona -->
    <g transform="translate(140, 0)">
      <rect x="-30" y="-20" width="60" height="40" rx="4" fill="#161b22" stroke="#30363d"/>
      <text x="0" y="5" text-anchor="middle" fill="#8b949e" font-family="Inter" font-size="8">Daytona</text>
      <path d="M-30 0 L-115 0" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4,2"/>
    </g>

    <!-- Remote Host -->
    <g transform="translate(140, 80)">
      <rect x="-30" y="-20" width="60" height="40" rx="4" fill="#161b22" stroke="#30363d"/>
      <text x="0" y="5" text-anchor="middle" fill="#8b949e" font-family="Inter" font-size="8">Fly.io / Host</text>
      <path d="M-30 0 L-115 -45" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4,2"/>
    </g>
  </g>
</svg>
