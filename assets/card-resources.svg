<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff3d00;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0b0b0d" rx="8"/>
  <g transform="translate(40, 40)">
    <!-- Host Plane (Secure) -->
    <rect x="0" y="0" width="140" height="220" rx="4" fill="#161b22" stroke="#334155" stroke-width="0.5"/>
    <text x="70" y="-10" text-anchor="middle" fill="#484f58" font-family="Inter" font-size="8">Host Surface</text>
    
    <!-- Secret Resolution -->
    <g transform="translate(10, 20)">
      <rect x="0" y="0" width="120" height="80" rx="4" fill="#0b0b0d" stroke="#30363d" stroke-width="1"/>
      <text x="10" y="15" fill="#8b949e" font-family="monospace" font-size="8">secret:GITHUB_TOKEN</text>
      <rect x="10" y="25" width="100" height="15" rx="2" fill="#161b22" stroke="#ff6b35" stroke-width="0.5" stroke-opacity="0.5"/>
      <text x="15" y="35" fill="#ff6b35" font-family="monospace" font-size="7">ghp_****************</text>
      <text x="10" y="60" fill="#484f58" font-family="Inter" font-size="6">Resolution happens here.</text>
      <text x="10" y="70" fill="#484f58" font-family="Inter" font-size="6">Plaintext never leaves host.</text>
    </g>

    <!-- Outbound Domains -->
    <g transform="translate(10, 120)">
      <rect x="0" y="0" width="120" height="80" rx="4" fill="#0b0b0d" stroke="#30363d" stroke-width="1"/>
      <text x="10" y="15" fill="#8b949e" font-family="monospace" font-size="8">allow_outbound:</text>
      <g transform="translate(10, 25)">
        <rect x="0" y="0" width="100" height="15" rx="2" fill="#166534" fill-opacity="0.1" stroke="#10b981" stroke-width="0.5"/>
        <text x="5" y="11" fill="#10b981" font-family="monospace" font-size="7">api.github.com</text>
      </g>
      <g transform="translate(10, 45)">
        <rect x="0" y="0" width="100" height="15" rx="2" fill="#166534" fill-opacity="0.1" stroke="#10b981" stroke-width="0.5"/>
        <text x="5" y="11" fill="#10b981" font-family="monospace" font-size="7">registry.npmjs.org</text>
      </g>
    </g>

    <!-- Sandbox Plane (Restricted) -->
    <g transform="translate(180, 0)">
      <rect x="0" y="0" width="140" height="220" rx="4" fill="#0b0b0d" stroke="#334155" stroke-width="0.5" stroke-dasharray="4,2"/>
      <text x="70" y="-10" text-anchor="middle" fill="#484f58" font-family="Inter" font-size="8">Sandbox</text>
      
      <!-- Injection -->
      <path d="M-40 40 L40 40" fill="none" stroke="#ff6b35" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrow-inject)"/>
      <text x="0" y="35" text-anchor="middle" fill="#ff6b35" font-family="monospace" font-size="7">proxy injection</text>
      
      <rect x="20" y="60" width="100" height="100" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="70" y="115" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="8">Agent Process</text>
    </g>
  </g>
  <defs>
    <marker id="arrow-inject" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff6b35" />
    </marker>
  </defs>
</svg>
