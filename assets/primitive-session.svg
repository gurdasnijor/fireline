<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff3d00;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0b0b0d" rx="8"/>
  <g transform="translate(50, 40)">
    <!-- Monotonic Log -->
    <rect x="0" y="20" width="300" height="180" rx="4" fill="#161b22" stroke="#334155" stroke-width="0.5"/>
    <text x="10" y="15" fill="#484f58" font-family="Inter" font-size="8">Session State (Append-only Log)</text>
    
    <!-- Growth indicator -->
    <path d="M305 20 L305 200" fill="none" stroke="#ff6b35" stroke-width="1" stroke-dasharray="4,2"/>
    <path d="M302 195 L305 200 L308 195" fill="none" stroke="#ff6b35" stroke-width="1"/>
    
    <!-- Log Entries -->
    <g transform="translate(10, 30)">
      <rect x="0" y="0" width="280" height="20" rx="2" fill="#1e293b" fill-opacity="0.3"/>
      <circle cx="10" cy="10" r="2" fill="#3b82f6"/>
      <rect x="20" y="8" width="100" height="4" rx="1" fill="#30363d"/>
    </g>
    <g transform="translate(10, 55)">
      <rect x="0" y="0" width="280" height="20" rx="2" fill="#1e293b" fill-opacity="0.3"/>
      <circle cx="10" cy="10" r="2" fill="#ff6b35"/>
      <rect x="20" y="8" width="150" height="4" rx="1" fill="#30363d"/>
    </g>
    <g transform="translate(10, 80)">
      <rect x="0" y="0" width="280" height="20" rx="2" fill="#1e293b" fill-opacity="0.3"/>
      <circle cx="10" cy="10" r="2" fill="#10b981"/>
      <rect x="20" y="8" width="80" height="4" rx="1" fill="#30363d"/>
    </g>
    <g transform="translate(10, 105)">
      <rect x="0" y="0" width="280" height="20" rx="2" fill="#1e293b" fill-opacity="0.3"/>
      <circle cx="10" cy="10" r="2" fill="#ff6b35"/>
      <rect x="20" y="8" width="120" height="4" rx="1" fill="#30363d"/>
    </g>
    
    <!-- Multiple Readers -->
    <g transform="translate(20, 220)">
      <text x="0" y="15" fill="#484f58" font-family="Inter" font-size="7">Reader 1</text>
      <path d="M20 0 L20 -40" fill="none" stroke="#334155" stroke-width="1" marker-end="url(#arrow)"/>
    </g>
    <g transform="translate(140, 220)">
      <text x="0" y="15" fill="#484f58" font-family="Inter" font-size="7">Reader 2 (Live)</text>
      <path d="M30 0 L30 -20" fill="none" stroke="#ff6b35" stroke-width="1" marker-end="url(#arrow)"/>
    </g>
    <g transform="translate(250, 220)">
      <text x="0" y="15" fill="#484f58" font-family="Inter" font-size="7">Reader 3</text>
      <path d="M20 0 L20 -70" fill="none" stroke="#334155" stroke-width="1" marker-end="url(#arrow)"/>
    </g>
  </g>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="4" markerHeight="4" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155" />
    </marker>
  </defs>
</svg>
