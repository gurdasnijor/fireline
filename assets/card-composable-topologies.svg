<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0b0b0d" rx="8"/>
  <g transform="translate(40, 60)">
    <!-- Agent Boxes -->
    <rect x="0" y="80" width="80" height="60" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="40" y="115" text-anchor="middle" fill="#8b949e" font-family="Inter" font-size="10">Planner</text>
    
    <rect x="240" y="80" width="80" height="60" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="280" y="115" text-anchor="middle" fill="#8b949e" font-family="Inter" font-size="10">Executor</text>
    
    <!-- Middleware Edge -->
    <line x1="80" y1="110" x2="240" y2="110" stroke="#ff6b35" stroke-width="2"/>
    <rect x="110" y="95" width="100" height="30" rx="15" fill="#1e293b" stroke="#ff6b35" stroke-width="1"/>
    <text x="160" y="114" text-anchor="middle" fill="#ff6b35" font-family="monospace" font-size="10">approve()</text>
    
    <!-- Another hop -->
    <path d="M280 80 Q280 20 160 20 T40 80" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="160" y="45" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="10">peer('reviewer')</text>
  </g>
</svg>
