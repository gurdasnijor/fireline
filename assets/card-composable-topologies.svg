<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff3d00;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0b0b0d" rx="8"/>
  <g transform="translate(40, 50)">
    <!-- Agent 1 -->
    <g transform="translate(0, 80)">
      <rect x="0" y="0" width="80" height="60" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="40" y="35" text-anchor="middle" fill="#8b949e" font-family="Inter" font-size="10">Planner</text>
      <circle cx="10" cy="10" r="3" fill="#ff6b35" fill-opacity="0.3"/>
    </g>
    
    <!-- Agent 2 -->
    <g transform="translate(240, 80)">
      <rect x="0" y="0" width="80" height="60" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="40" y="35" text-anchor="middle" fill="#8b949e" font-family="Inter" font-size="10">Executor</text>
      <circle cx="10" cy="10" r="3" fill="#10b981" fill-opacity="0.3"/>
    </g>
    
    <!-- Middleware Edge -->
    <g transform="translate(80, 110)">
      <line x1="0" y1="0" x2="160" y2="0" stroke="#ff6b35" stroke-width="2" stroke-opacity="0.6"/>
      <!-- Flowing events -->
      <circle cx="40" cy="0" r="2" fill="#ff6b35"/>
      <circle cx="120" cy="0" r="2" fill="#ff6b35"/>
      
      <rect x="30" y="-15" width="100" height="30" rx="15" fill="#1e293b" stroke="#ff6b35" stroke-width="1"/>
      <text x="80" y="4" text-anchor="middle" fill="#ff6b35" font-family="monospace" font-size="10">approve()</text>
    </g>
    
    <!-- Cross-agent Hop -->
    <g transform="translate(40, 80)">
      <path d="M240 0 Q120 -80 0 0" fill="none" stroke="#334155" stroke-width="1.5" stroke-dasharray="4,2"/>
      <rect x="70" y="-60" width="100" height="20" rx="10" fill="#0b0b0d" stroke="#334155" stroke-width="0.5"/>
      <text x="120" y="-47" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="8">peer('reviewer')</text>
      <!-- Trace context moving -->
      <circle cx="120" cy="-40" r="2" fill="#3b82f6" fill-opacity="0.5">
        <animate attributeName="cx" from="200" to="40" dur="2s" repeatCount="indefinite" />
      </circle>
    </g>

    <!-- Edge Density: Lines and Dots -->
    <path d="M320 110 Q350 110 350 150 T320 200" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="320" y="215" text-anchor="end" fill="#484f58" font-family="Inter" font-size="7">Fanout / Topology</text>
  </g>
</svg>
