<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="900" y2="480">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0f1628"/>
    </linearGradient>
  </defs>

  <rect width="900" height="480" fill="url(#bg3)" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="600">What Fireline Replaces</text>

  <!-- BEFORE column -->
  <rect x="30" y="60" width="410" height="390" rx="10" fill="#1a0a0a" stroke="#7f1d1d" stroke-width="1" opacity="0.8"/>
  <text x="235" y="88" text-anchor="middle" fill="#fca5a5" font-family="system-ui, sans-serif" font-size="14" font-weight="600">Without Fireline</text>

  <text x="50" y="118" fill="#ef4444" font-family="monospace" font-size="11" opacity="0.7">// 186 lines — manual WebSocket management</text>
  <text x="50" y="136" fill="#94a3b8" font-family="monospace" font-size="11">const ws = new WebSocket(url)</text>
  <text x="50" y="152" fill="#94a3b8" font-family="monospace" font-size="11">ws.onmessage = (event) => {</text>
  <text x="50" y="168" fill="#94a3b8" font-family="monospace" font-size="11">  const msg = JSON.parse(event.data)</text>
  <text x="50" y="184" fill="#94a3b8" font-family="monospace" font-size="11">  if (msg.type === "event" &&</text>
  <text x="50" y="200" fill="#94a3b8" font-family="monospace" font-size="11">      msg.event?.type === "queue.updated")</text>
  <text x="50" y="216" fill="#94a3b8" font-family="monospace" font-size="11">    setWsStatuses(prev => {</text>
  <text x="50" y="232" fill="#94a3b8" font-family="monospace" font-size="11">      const next = new Map(prev)</text>
  <text x="50" y="248" fill="#94a3b8" font-family="monospace" font-size="11">      next.set(id, { processing: ...</text>
  <text x="50" y="264" fill="#64748b" font-family="monospace" font-size="11">      // ... 150 more lines ...</text>
  <text x="50" y="280" fill="#94a3b8" font-family="monospace" font-size="11">}</text>

  <text x="50" y="310" fill="#ef4444" font-family="monospace" font-size="11" opacity="0.7">// + REST polling fallback</text>
  <text x="50" y="326" fill="#94a3b8" font-family="monospace" font-size="11">useQuery({</text>
  <text x="50" y="342" fill="#94a3b8" font-family="monospace" font-size="11">  queryFn: () => client.fetchSessions(),</text>
  <text x="50" y="358" fill="#94a3b8" font-family="monospace" font-size="11">  refetchInterval: 5_000,</text>
  <text x="50" y="374" fill="#94a3b8" font-family="monospace" font-size="11">})</text>

  <text x="50" y="404" fill="#ef4444" font-family="monospace" font-size="11" opacity="0.7">// + merge WS and REST statuses</text>
  <text x="50" y="420" fill="#94a3b8" font-family="monospace" font-size="11">return wsStatuses.get(id)</text>
  <text x="50" y="436" fill="#94a3b8" font-family="monospace" font-size="11">  ?? restStatuses.get(id)</text>

  <!-- AFTER column -->
  <rect x="460" y="60" width="410" height="390" rx="10" fill="#0a1a0a" stroke="#14532d" stroke-width="1" opacity="0.8"/>
  <text x="665" y="88" text-anchor="middle" fill="#86efac" font-family="system-ui, sans-serif" font-size="14" font-weight="600">With Fireline</text>

  <text x="480" y="118" fill="#22c55e" font-family="monospace" font-size="11" opacity="0.7">// 10 lines — reactive live query</text>
  <text x="480" y="148" fill="#86efac" font-family="monospace" font-size="12">const db = createFirelineDB({</text>
  <text x="480" y="168" fill="#86efac" font-family="monospace" font-size="12">  stateStreamUrl: handle.state.url</text>
  <text x="480" y="188" fill="#86efac" font-family="monospace" font-size="12">})</text>
  <text x="480" y="220" fill="#86efac" font-family="monospace" font-size="12">const turns = useLiveQuery(q =></text>
  <text x="480" y="240" fill="#86efac" font-family="monospace" font-size="12">  q.from({ t: db.collections</text>
  <text x="480" y="260" fill="#86efac" font-family="monospace" font-size="12">      .promptTurns })</text>
  <text x="480" y="280" fill="#86efac" font-family="monospace" font-size="12">)</text>
  <text x="480" y="312" fill="#86efac" font-family="monospace" font-size="12">const perms = useLiveQuery(q =></text>
  <text x="480" y="332" fill="#86efac" font-family="monospace" font-size="12">  q.from({ p: db.collections</text>
  <text x="480" y="352" fill="#86efac" font-family="monospace" font-size="12">      .permissions })</text>
  <text x="480" y="372" fill="#86efac" font-family="monospace" font-size="12">)</text>

  <text x="480" y="410" fill="#22c55e" font-family="monospace" font-size="11" opacity="0.7">// No WebSocket. No polling.</text>
  <text x="480" y="428" fill="#22c55e" font-family="monospace" font-size="11" opacity="0.7">// The stream IS the API.</text>

  <!-- Stats -->
  <rect x="520" y="434" width="100" height="14" rx="3" fill="#14532d" opacity="0.5"/>
  <text x="570" y="445" text-anchor="middle" fill="#86efac" font-family="monospace" font-size="10" font-weight="600">-176 lines</text>

  <!-- Bottom comparison line -->
  <text x="450" y="472" text-anchor="middle" fill="#475569" font-family="system-ui, sans-serif" font-size="11">From Flamecast's use-queue-session-status.ts (186 lines) to Fireline's useLiveQuery (10 lines)</text>
</svg>
