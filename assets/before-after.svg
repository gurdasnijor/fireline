<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <rect width="900" height="500" fill="#0b1020" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e2e8f0" font-family="ui-monospace, monospace" font-size="18" font-weight="600">What Fireline Replaces</text>

  <!-- BEFORE panel -->
  <rect x="30" y="60" width="410" height="400" rx="10" fill="#140a0a" stroke="#991b1b" stroke-width="1"/>
  <rect x="30" y="60" width="410" height="32" rx="10" fill="#991b1b" fill-opacity="0.25"/>
  <text x="235" y="82" text-anchor="middle" fill="#fca5a5" font-family="ui-monospace, monospace" font-size="13" font-weight="600">Without Fireline</text>

  <text x="50" y="115" fill="#dc2626" font-family="ui-monospace, monospace" font-size="10">// 186 lines of manual infrastructure</text>

  <text x="50" y="140" fill="#a1a1aa" font-family="ui-monospace, monospace" font-size="11">const ws = new WebSocket(url)</text>
  <text x="50" y="158" fill="#a1a1aa" font-family="ui-monospace, monospace" font-size="11">ws.onmessage = (event) =&gt; {</text>
  <text x="50" y="176" fill="#a1a1aa" font-family="ui-monospace, monospace" font-size="11">  const msg = JSON.parse(event.data)</text>
  <text x="50" y="194" fill="#a1a1aa" font-family="ui-monospace, monospace" font-size="11">  if (msg.type === &quot;event&quot; &amp;&amp;</text>
  <text x="50" y="212" fill="#a1a1aa" font-family="ui-monospace, monospace" font-size="11">      msg.event?.type === </text>
  <text x="50" y="230" fill="#a1a1aa" font-family="ui-monospace, monospace" font-size="11">        &quot;queue.updated&quot;) {</text>
  <text x="50" y="248" fill="#a1a1aa" font-family="ui-monospace, monospace" font-size="11">    setWsStatuses(prev =&gt; {</text>
  <text x="50" y="266" fill="#a1a1aa" font-family="ui-monospace, monospace" font-size="11">      const next = new Map(prev)</text>
  <text x="50" y="284" fill="#a1a1aa" font-family="ui-monospace, monospace" font-size="11">      next.set(id, {</text>
  <text x="50" y="302" fill="#a1a1aa" font-family="ui-monospace, monospace" font-size="11">        processing: data?.processing</text>
  <text x="50" y="320" fill="#71717a" font-family="ui-monospace, monospace" font-size="11">        // ... 130 more lines ...</text>

  <text x="50" y="352" fill="#dc2626" font-family="ui-monospace, monospace" font-size="10">// + REST polling fallback every 5s</text>
  <text x="50" y="370" fill="#a1a1aa" font-family="ui-monospace, monospace" font-size="11">useQuery({ refetchInterval: 5000 })</text>

  <text x="50" y="400" fill="#dc2626" font-family="ui-monospace, monospace" font-size="10">// + merge WS and REST statuses</text>
  <text x="50" y="418" fill="#a1a1aa" font-family="ui-monospace, monospace" font-size="11">return wsStatuses.get(id)</text>
  <text x="50" y="436" fill="#a1a1aa" font-family="ui-monospace, monospace" font-size="11">  ?? restStatuses.get(id)</text>

  <!-- AFTER panel -->
  <rect x="460" y="60" width="410" height="400" rx="10" fill="#0a140a" stroke="#166534" stroke-width="1"/>
  <rect x="460" y="60" width="410" height="32" rx="10" fill="#166534" fill-opacity="0.25"/>
  <text x="665" y="82" text-anchor="middle" fill="#86efac" font-family="ui-monospace, monospace" font-size="13" font-weight="600">With Fireline</text>

  <text x="480" y="115" fill="#22c55e" font-family="ui-monospace, monospace" font-size="10">// 10 lines. Zero WebSocket code.</text>

  <text x="480" y="148" fill="#86efac" font-family="ui-monospace, monospace" font-size="12">const db = createFirelineDB({</text>
  <text x="480" y="170" fill="#86efac" font-family="ui-monospace, monospace" font-size="12">  stateStreamUrl:</text>
  <text x="480" y="192" fill="#86efac" font-family="ui-monospace, monospace" font-size="12">    handle.state.url</text>
  <text x="480" y="214" fill="#86efac" font-family="ui-monospace, monospace" font-size="12">})</text>

  <text x="480" y="250" fill="#86efac" font-family="ui-monospace, monospace" font-size="12">const turns =</text>
  <text x="480" y="272" fill="#86efac" font-family="ui-monospace, monospace" font-size="12">  useLiveQuery(q =&gt;</text>
  <text x="480" y="294" fill="#86efac" font-family="ui-monospace, monospace" font-size="12">    q.from({</text>
  <text x="480" y="316" fill="#86efac" font-family="ui-monospace, monospace" font-size="12">      t: db.collections</text>
  <text x="480" y="338" fill="#86efac" font-family="ui-monospace, monospace" font-size="12">        .promptTurns</text>
  <text x="480" y="360" fill="#86efac" font-family="ui-monospace, monospace" font-size="12">    })</text>
  <text x="480" y="382" fill="#86efac" font-family="ui-monospace, monospace" font-size="12">  )</text>

  <text x="480" y="418" fill="#22c55e" font-family="ui-monospace, monospace" font-size="10">// No WebSocket. No polling.</text>
  <text x="480" y="436" fill="#22c55e" font-family="ui-monospace, monospace" font-size="10">// The stream IS the API.</text>

  <!-- Stats badge -->
  <rect x="540" y="442" width="90" height="18" rx="4" fill="#166534"/>
  <text x="585" y="455" text-anchor="middle" fill="#86efac" font-family="ui-monospace, monospace" font-size="10" font-weight="700">-176 lines</text>

  <!-- Bottom caption -->
  <text x="450" y="487" text-anchor="middle" fill="#52525b" font-family="ui-monospace, monospace" font-size="10">Flamecast use-queue-session-status.ts (186 lines) vs Fireline useLiveQuery (10 lines)</text>
</svg>
