<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#0b0b0d" rx="8"/>
  <g transform="translate(50, 50)">
    <!-- Stream -->
    <rect x="0" y="100" width="300" height="10" rx="5" fill="#1e293b"/>
    <line x1="0" y1="105" x2="300" y2="105" stroke="#334155" stroke-width="1" stroke-dasharray="8,4"/>
    
    <!-- Lanes -->
    <g transform="translate(100, 40)">
      <path d="M0 65 L50 20" fill="none" stroke="#ff6b35" stroke-width="1.5"/>
      <rect x="50" y="0" width="100" height="30" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="100" y="20" text-anchor="middle" fill="#8b949e" font-family="Inter" font-size="10">Passive Wait</text>
    </g>
    
    <g transform="translate(100, 140)">
      <path d="M0 -35 L50 10" fill="none" stroke="#ff6b35" stroke-width="1.5"/>
      <rect x="50" y="0" width="100" height="40" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="100" y="15" text-anchor="middle" fill="#8b949e" font-family="Inter" font-size="10">Active Push</text>
      <text x="100" y="30" text-anchor="middle" fill="#484f58" font-family="Inter" font-size="8">Webhook / Telegram</text>
    </g>
    
    <circle cx="100" cy="105" r="5" fill="#ff6b35"/>
    <path d="M95 105 L105 100 L105 110 Z" fill="#0b0b0d"/> <!-- Cursor arrow -->
  </g>
</svg>
