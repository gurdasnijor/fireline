<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff3d00;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0b0b0d" rx="8"/>
  <g transform="translate(40, 50)">
    <!-- Main Stream -->
    <rect x="0" y="100" width="320" height="6" rx="3" fill="#1e293b"/>
    <line x1="0" y1="103" x2="320" y2="103" stroke="#334155" stroke-width="1" stroke-dasharray="4,2"/>
    
    <!-- Event Dots -->
    <circle cx="20" cy="103" r="3" fill="#3b82f6" stroke="#0b0b0d" stroke-width="0.5"/>
    <circle cx="50" cy="103" r="3" fill="#ff6b35" stroke="#0b0b0d" stroke-width="0.5"/>
    <circle cx="80" cy="103" r="3" fill="#10b981" stroke="#0b0b0d" stroke-width="0.5"/>
    <circle cx="110" cy="103" r="3" fill="#8b5cf6" stroke="#0b0b0d" stroke-width="0.5"/>
    <circle cx="140" cy="103" r="3" fill="#ff6b35" stroke="#0b0b0d" stroke-width="0.5"/>
    
    <!-- Branching Lanes -->
    <!-- Lane 1: Passive Wait -->
    <g transform="translate(150, 40)">
      <path d="M-10 63 Q40 63 40 20" fill="none" stroke="#ff6b35" stroke-width="1.5" stroke-opacity="0.6"/>
      <rect x="40" y="-10" width="100" height="30" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="90" y="10" text-anchor="middle" fill="#8b949e" font-family="Inter" font-size="10">Passive Wait</text>
      <text x="90" y="22" text-anchor="middle" fill="#484f58" font-family="Inter" font-size="7">Approvals</text>
    </g>
    
    <!-- Lane 2: Active Push (Webhook) -->
    <g transform="translate(150, 140)">
      <path d="M-10 -37 Q40 -37 40 10" fill="none" stroke="#ff6b35" stroke-width="1.5" stroke-opacity="0.6"/>
      <rect x="40" y="-5" width="100" height="30" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="90" y="12" text-anchor="middle" fill="#8b949e" font-family="Inter" font-size="10">Webhook</text>
      <text x="90" y="24" text-anchor="middle" fill="#484f58" font-family="Inter" font-size="7">at-least-once</text>
    </g>

    <!-- Lane 3: Active Push (Telegram) -->
    <g transform="translate(200, 180)">
      <path d="M-60 -77 Q0 -77 0 10" fill="none" stroke="#ff6b35" stroke-width="1" stroke-opacity="0.4" stroke-dasharray="4,2"/>
      <rect x="0" y="-5" width="100" height="30" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="50" y="12" text-anchor="middle" fill="#8b949e" font-family="Inter" font-size="10">Telegram</text>
    </g>
    
    <!-- Durable Cursor -->
    <g transform="translate(140, 103)">
      <circle r="6" fill="#0b0b0d" stroke="#ff6b35" stroke-width="1"/>
      <path d="M-2 -2 L2 0 L-2 2 Z" fill="#ff6b35"/>
    </g>
  </g>
</svg>
