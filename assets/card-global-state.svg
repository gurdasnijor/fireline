<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="flameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff3d00;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="#0b0b0d" rx="8"/>
  <g transform="translate(40, 40)">
    <!-- ID Rows -->
    <g transform="translate(0, 20)">
      <rect x="0" y="0" width="220" height="20" rx="2" fill="#161b22" stroke="#334155" stroke-width="0.5"/>
      <text x="5" y="13" fill="#8b949e" font-family="monospace" font-size="8">session:abc-123</text>
      <rect x="130" y="4" width="80" height="12" rx="1" fill="#ff6b35" fill-opacity="0.1" stroke="#ff6b35" stroke-width="0.5"/>
      <text x="135" y="12" fill="#ff6b35" font-family="monospace" font-size="7">RUNNING</text>
    </g>
    <g transform="translate(0, 45)">
      <rect x="0" y="0" width="220" height="20" rx="2" fill="#161b22" stroke="#334155" stroke-width="0.5"/>
      <text x="5" y="13" fill="#8b949e" font-family="monospace" font-size="8">request:def-456</text>
      <rect x="130" y="4" width="80" height="12" rx="1" fill="#30363d" stroke="#334155" stroke-width="0.5"/>
      <text x="135" y="12" fill="#484f58" font-family="monospace" font-size="7">PENDING</text>
    </g>
    <g transform="translate(0, 70)">
      <rect x="0" y="0" width="220" height="20" rx="2" fill="#161b22" stroke="#334155" stroke-width="0.5"/>
      <text x="5" y="13" fill="#8b949e" font-family="monospace" font-size="8">tool:ghi-789</text>
      <rect x="130" y="4" width="80" height="12" rx="1" fill="#166534" fill-opacity="0.1" stroke="#10b981" stroke-width="0.5"/>
      <text x="135" y="12" fill="#10b981" font-family="monospace" font-size="7">COMPLETED</text>
    </g>

    <!-- Fanning out to consumers -->
    <path d="M220 30 Q270 30 300 60" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4,2"/>
    <path d="M220 55 Q270 55 300 110" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4,2"/>
    <path d="M220 80 Q270 80 300 160" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="4,2"/>

    <!-- Consumer Glyphs -->
    <g transform="translate(300, 60)">
      <rect x="-15" y="-15" width="30" height="30" rx="4" fill="#161b22" stroke="#30363d"/>
      <text x="0" y="5" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="12">&gt;_</text>
      <text x="0" y="25" text-anchor="middle" fill="#484f58" font-family="Inter" font-size="7">Terminal</text>
    </g>
    <g transform="translate(300, 110)">
      <rect x="-15" y="-15" width="30" height="30" rx="4" fill="#161b22" stroke="#30363d"/>
      <rect x="-10" y="-10" width="20" height="4" rx="1" fill="#30363d"/>
      <rect x="-10" y="-2" width="12" height="12" rx="1" fill="#30363d"/>
      <text x="0" y="25" text-anchor="middle" fill="#484f58" font-family="Inter" font-size="7">UI Card</text>
    </g>
    <g transform="translate(300, 160)">
      <rect x="-15" y="-15" width="30" height="30" rx="4" fill="#161b22" stroke="#30363d"/>
      <circle cx="0" cy="-4" r="5" fill="#30363d"/>
      <path d="M-8 8 Q0 0 8 8" fill="none" stroke="#30363d" stroke-width="2"/>
      <text x="0" y="25" text-anchor="middle" fill="#484f58" font-family="Inter" font-size="7">Bot</text>
    </g>
  </g>
</svg>
