INVARIANT RuntimeDependentOnHost
INVARIANT StreamIsSoleSourceOfTruth
INVARIANT RuntimeStopOnlyAffectsCurrentOwner
INVARIANT HostRemovalRemovesHostedRuntimes
INVARIANT ResourcePublishedIsEventuallyDiscoverable
INVARIANT ResourceUnpublishedIsEventuallyInvisible
INVARIANT ResourceUpdateMergesMetadata
INVARIANT PublisherOwnsUnpublish
INVARIANT SourceRefIsImmutableAfterPublish
INVARIANT ResourceIdIsUniqueWithinTenant
INVARIANT UnpublishedResourceCannotBeUpdated
