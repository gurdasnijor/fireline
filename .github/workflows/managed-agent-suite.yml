name: Managed Agent Suite

on:
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - src/**
      - crates/**
      - tests/**
      - docker/**
      - docker-compose.yml
      - .github/workflows/managed-agent-suite.yml
  push:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - src/**
      - crates/**
      - tests/**
      - docker/**
      - docker-compose.yml
      - .github/workflows/managed-agent-suite.yml
  workflow_dispatch:

concurrency:
  group: managed-agent-suite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  managed-agent-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run managed-agent Rust suite
        run: |
          cargo test \
            --test managed_agent_session \
            --test managed_agent_sandbox \
            --test managed_agent_harness \
            --test managed_agent_resources \
            --test managed_agent_tools \
            --test managed_agent_orchestration \
            --test managed_agent_primitives_suite \
            --test runtime_index_agreement \
            -- --nocapture --test-threads=1

      # `tests/control_plane_docker.rs` is NOT in the workflow yet:
      # the test triggers a fresh `docker build` of
      # `docker/fireline-runtime.Dockerfile` on every run, and a full
      # release build of `fireline` + `fireline-testy` inside the
      # container takes several minutes while the control plane's
      # `wait_for_runtime_ready` deadline is ~20s. Enabling it requires
      # pre-building a fixed-tag image in a separate CI step with
      # layer caching (Docker buildx cache-to/cache-from) + teaching
      # the test to accept a pre-built image via env var instead of
      # generating a random tag. See the Docker-scoped markers in
      # tests/managed_agent_{sandbox,resources,primitives_suite}.rs
      # for the invariants that would be validated in CI once this
      # lands. Tracked as post-demo follow-up.

  docker-host-images:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate multi-arch host images
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file docker/fireline-host.Dockerfile \
            --tag fireline-host:ci \
            .
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file docker/fireline-streams.Dockerfile \
            --tag fireline-streams:ci \
            .
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --file docker/fireline-host-quickstart.Dockerfile \
            --tag fireline-host-quickstart:ci \
            .

      - name: Smoke test sidecar compose topology
        run: |
          cleanup() {
            docker compose down -v --remove-orphans || true
          }
          trap cleanup EXIT
          docker compose up -d --build
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:4440/healthz >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:4440/healthz | grep -q '^ok$'

      - name: Smoke test bundled quickstart image
        run: |
          mkdir -p .tmp/fireline-host-quickstart
          chmod 0777 .tmp/fireline-host-quickstart
          cleanup() {
            docker rm -f fireline-host-quickstart-smoke >/dev/null 2>&1 || true
            rm -rf .tmp/fireline-host-quickstart
          }
          trap cleanup EXIT
          docker build \
            --file docker/fireline-host-quickstart.Dockerfile \
            --tag fireline-host-quickstart:smoke \
            .
          docker run -d \
            --name fireline-host-quickstart-smoke \
            -p 4441:4440 \
            -p 7475:7474 \
            -v "$PWD/.tmp/fireline-host-quickstart:/var/lib/fireline" \
            fireline-host-quickstart:smoke
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:4441/healthz >/dev/null && \
               curl -fsS http://127.0.0.1:7475/healthz >/dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:4441/healthz | grep -q '^ok$'
          curl -fsS http://127.0.0.1:7475/healthz | grep -q '^ok$'
