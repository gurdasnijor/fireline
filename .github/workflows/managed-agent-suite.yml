name: Managed Agent Suite

on:
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - src/**
      - crates/**
      - tests/**
      - docker/**
      - .github/workflows/managed-agent-suite.yml
  push:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
      - src/**
      - crates/**
      - tests/**
      - docker/**
      - .github/workflows/managed-agent-suite.yml
  workflow_dispatch:

concurrency:
  group: managed-agent-suite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  managed-agent-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run managed-agent Rust suite
        run: |
          cargo test \
            --test managed_agent_session \
            --test managed_agent_sandbox \
            --test managed_agent_harness \
            --test managed_agent_resources \
            --test managed_agent_tools \
            --test managed_agent_orchestration \
            --test managed_agent_primitives_suite \
            --test runtime_index_agreement \
            -- --nocapture --test-threads=1

      # `tests/control_plane_docker.rs` is NOT in the workflow yet:
      # the test triggers a fresh `docker build` of
      # `docker/fireline-runtime.Dockerfile` on every run, and a full
      # release build of `fireline` + `fireline-testy` inside the
      # container takes several minutes while the control plane's
      # `wait_for_runtime_ready` deadline is ~20s. Enabling it requires
      # pre-building a fixed-tag image in a separate CI step with
      # layer caching (Docker buildx cache-to/cache-from) + teaching
      # the test to accept a pre-built image via env var instead of
      # generating a random tag. See the Docker-scoped markers in
      # tests/managed_agent_{sandbox,resources,primitives_suite}.rs
      # for the invariants that would be validated in CI once this
      # lands. Tracked as post-demo follow-up.
