name: Fireline CLI

on:
  pull_request:
    paths:
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - packages/fireline/**
      - .github/workflows/fireline-cli.yml
  push:
    paths:
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - packages/fireline/**
      - .github/workflows/fireline-cli.yml
  workflow_dispatch:

jobs:
  cli:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint @fireline/cli
        run: pnpm --filter @fireline/cli lint

      - name: Test @fireline/cli
        run: pnpm --filter @fireline/cli test
